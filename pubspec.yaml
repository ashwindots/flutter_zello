name: zello
description: >-
  Flutter plugin wrapping the native Zello Work Mobile SDKs (Android/iOS) for
  push-to-talk, voice RX/TX, text messaging, channels and presence.
version: 0.1.0
repository: https://github.com/ashwindots/flutter_zello
issue_tracker: https://github.com/ashwindots/flutter_zello/issues

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.zello.flutter
        pluginClass: ZelloPlugin
      ios:
        pluginClass: ZelloPlugin
        sharedDarwinSource: false
