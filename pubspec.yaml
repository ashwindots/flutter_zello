name: zello
description: >-
  Flutter plugin that wraps the native Zello Work Mobile SDKs (Android Kotlin,
  iOS Swift) and exposes a clean, idiomatic Dart API for push-to-talk, voice
  RX/TX, text messages, channel state and presence over platform channels.
version: 0.1.0
homepage: https://github.com/your-org/zello-flutter
repository: https://github.com/your-org/zello-flutter
issue_tracker: https://github.com/your-org/zello-flutter/issues

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.zello.flutter
        pluginClass: ZelloPlugin
      ios:
        pluginClass: ZelloPlugin
